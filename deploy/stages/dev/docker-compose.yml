# Dev-stage stack for the image-gen worker (DESIGN.md §9).
#
# Brings up, against emulators (no GPU, no GCP creds):
#   * fake-gcs-server — GCS-compatible blob store the worker downloads inputs
#                       from / uploads outputs to.
#   * mock-comfyui    — drop-in ComfyUI (tests/mock_comfyui): streams the real
#                       WebSocket event sequence + returns PNGs, no models. OFF
#                       by default (`mock` profile); opt in with `up.sh --mock`.
#                       Otherwise the worker uses the host's real ComfyUI :8188.
#   * imagegen-worker — the worker itself, pulling jobs + publishing completions.
#
# It deliberately does NOT run a Pub/Sub emulator. The worker attaches to the
# Application local stack's network (APPSTACK_NETWORK, default local_default) and
# reaches its `pubsub-emulator` by name — so the API server and worker share one
# emulator and one set of §6.1 topics/subs. Bring that stack up first:
#   ../../../../Application/server/deploy/stages/local/up.sh
#
# Every value comes from deploy/stages/dev/env.sh via ${VAR} substitution — no
# literals here. up.sh/down.sh/smoke.sh source env.sh before invoking compose; a
# direct `docker compose` call must too.
#
# Build context is the repo root (`../../..`) so the worker image sees
# pyproject.toml + imagegen/; mock-comfyui builds from tests/mock_comfyui.

name: imagegen-worker-dev

services:
  # NOTE: fake-gcs-server is NOT defined here. The Application local stack owns
  # the single shared GCS emulator (server/deploy/stages/local/docker-compose.yml)
  # so the API server and the worker read/write the SAME bucket. The worker
  # reaches it as `fake-gcs-server` over the appstack network (APPSTACK_NETWORK),
  # via STORAGE_EMULATOR_HOST from env.sh. Bring that stack up first.

  mock-comfyui:
    # Behind the `mock` profile, OFF by default. dev points the worker at the
    # host's real imagegen-comfyui (:8188) via host.docker.internal (see the
    # worker's extra_hosts). Opt in to the mock with `up.sh --mock` (or
    # COMFYUI_BACKEND=mock), which env.sh maps to COMPOSE_PROFILES=mock so this
    # container starts and the worker is pointed at it by service name.
    profiles: ["mock"]
    build:
      context: ../../../tests/mock_comfyui
      dockerfile: Dockerfile
    image: imagegen-mock-comfyui:latest
    environment:
      MOCK_PORT: "8188"
      # Fast but still exercises the streaming/blocking path. Raise to simulate
      # slow generation; keep panels × this under MAX_PROCESSING_SECONDS.
      MOCK_STEP_DELAY: "0.2"
      MOCK_FAIL_MODE: none
      MOCK_WIDTH: "1024"
      MOCK_HEIGHT: "736"
      # A/B layout for the panel/variant label drawn on each mock image. Matches
      # templates/1 (6 panels × 2 variants); the worker derives the real
      # panel_index/variant itself from the template's SaveImage nodes.
      MOCK_VARIANTS_PER_PANEL: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8188/system_stats').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  imagegen-worker:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: imagegen-worker:dev
    depends_on:
      mock-comfyui:
        condition: service_healthy
        # Optional: with COMFYUI_BACKEND=real the `mock` profile is off and
        # mock-comfyui isn't started — the worker must still come up (it points
        # at the host's real imagegen-comfyui instead).
        required: false
    extra_hosts:
      # Reach the host's real imagegen-comfyui (:8188) — the default backend
      # (COMFYUI_URL=http://host.docker.internal:8188). Harmless under --mock.
      - "host.docker.internal:host-gateway"
    environment:
      # Worker config (config.py). GOOGLE_CLOUD_PROJECT mirrors GCP_PROJECT_ID so
      # the google-cloud-storage client picks up a project under the emulator.
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID}
      JOBS_SUBSCRIPTION: ${JOBS_SUBSCRIPTION}
      COMPLETION_TOPIC: ${COMPLETION_TOPIC}
      # Bucket the worker reads inputs from / writes outputs to. The job message
      # no longer carries a gcs_uri/output_prefix — the worker derives both from
      # this bucket + the message ids (DESIGN.md §5.1).
      GCS_BUCKET: ${GCS_BUCKET}
      PUBSUB_EMULATOR_HOST: ${PUBSUB_EMULATOR_HOST}
      STORAGE_EMULATOR_HOST: ${STORAGE_EMULATOR_HOST}
      COMFYUI_URL: ${COMFYUI_URL}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY}
      MAX_PROCESSING_SECONDS: ${MAX_PROCESSING_SECONDS}
      MAX_DELIVERY_ATTEMPTS: ${MAX_DELIVERY_ATTEMPTS}
      MODEL_VERSION: ${MODEL_VERSION}
      LOG_LEVEL: ${LOG_LEVEL}
    # The image installs image-gen-contract at the commit pyproject.toml pins,
    # which now tracks the local ../ImageGenContract HEAD (pushed so the build can
    # fetch it). Keep that pin current — see CLAUDE.md "Contract pin".
    volumes:
      # Hot-reload pure-Python changes without a rebuild (DESIGN.md §9.3). The
      # local /app/imagegen shadows the installed copy; restart the worker to
      # pick up edits: `docker compose ... restart imagegen-worker`.
      - ../../../imagegen:/app/imagegen:ro
    networks:
      - default
      - appstack
    restart: unless-stopped

networks:
  # This stack's own network — fake-gcs-server + mock-comfyui + worker.
  default:
  # The Application local stack's network, joined so the worker resolves
  # `pubsub-emulator`. External: created by that stack, not this one.
  appstack:
    name: ${APPSTACK_NETWORK:-local_default}
    external: true
