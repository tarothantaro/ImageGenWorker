[project]
name = "imagegen-worker"
version = "0.1.0"
description = "Stateless image-generation worker that pulls jobs from Pub/Sub."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "image-gen-contract @ git+https://github.com/tarothantaro/ImageGenContract@7ee0c6447f957aa88ff2385724f519e0a3a48091",
]

[project.optional-dependencies]
runtime = [
    "google-cloud-pubsub>=2.21",
    "google-cloud-storage>=2.16",
]
test = [
    "pytest>=8",
    "pytest-cov>=5",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["imagegen*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.coverage.run]
source = ["imagegen"]
omit = [
    "imagegen/main.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
fail_under = 100
show_missing = true
skip_covered = false
